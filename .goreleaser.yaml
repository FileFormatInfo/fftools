archives:
  - formats: [tar.gz]
    # this name template makes the OS and Arch compatible with the results of `uname`.
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    # use zip for windows archives
    format_overrides:
      - goos: windows
        formats: [zip]


homebrew_casks:
  - name: fftools
    binaries:
      - asciify
      - asciitable
      - bytecount
      - certinfo
      - ghash
      - hexdumpc
      - hosty
      - unhexdump
      - unicount
      - uniwhat
      - urly
    # manpages:
    # completions:
    directory: Casks
    skip_upload: true
    commit_author:
      name: Andrew Marcuse
      email: fileformat@gmail.com
    description: "Utilities for analyzing, viewing and fixing file formats."
    homepage: "https://tools.fileformat.info/"
    license: "GPL-3.0-or-later"
    repository:
      owner: FileFormatInfo
      name: fftools-tap
      # token:

nfpms:
  - id: fftools
    package_name: fftools
    vendor: FileFormatInfo
    homepage: "https://www.fileformat.info/"
    maintainer: Andrew Marcuse <fileformat@gmail.com>
    description: |-
      Utilities for analyzing, viewing and fixing file formats.
    license: GPL-3.0-and-later
    formats:
      - deb
      - rpm

report_sizes: true

