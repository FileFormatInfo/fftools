version: 2

project_name: fftools

before:
  hooks:
    - go mod tidy

builds:
  - id: asciify
    main: ./cmd/asciify/asciify.go
    binary: asciify
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    ldflags:
      - -s
      - -w
      - -X main.VERSION={{.Version}}
      - -X main.LASTMOD={{.Timestamp}}
      - -X main.COMMIT={{.ShortCommit}}
      - -X main.BUILDER=goreleaser

